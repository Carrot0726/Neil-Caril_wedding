<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Detail | Wedding Website</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      background-color: #efefef;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    /* ===== 導覽列 ===== */
    .nav {
      position: fixed;
      top: 30px;
      right: 40px;
      display: flex;
      gap: 24px;
      padding: 8px 0;
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
    }

    .nav a {
      text-decoration: none;
      color: #333;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .nav a:hover {
      opacity: 0.6;
    }
     body {
    margin: 0;
    background-color: #efefef;
  }
  h1 img {
    width: auto;
    height: 80px;
    display: block;
    margin-left: 20px;
    margin-top: -20px;
  }
  .event-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
  width: 85%;
  margin: 10px auto;
}

.event-info {
  width: 42%;
}

.event-title {
  width: 360px;
  display: block;
  margin-bottom: 40px;
}

.event-detail {
  font-size: 18px;
  line-height: 1.9;
  color: #222;
  letter-spacing: 1px;
}

.event-detail p {
  margin: 0 0 12px;
}
.label {
  display: inline-block;
  width: 70px;
}

/* ⭐ 第二行對齊 */
.sub-item {
  padding-left: 70px;   /* ⚠️ 用 padding 比 margin 穩 */
  margin-top: -8px;     /* 可選，讓兩行更靠近 */
}

.address {
  margin-left: 70px;
  font-size: 18px;
}

.event-photo-area {
  width: 42%;
}

.event-photo {
  width: 100%;
  display: block;
}
.map-section {
  display: flex;
  gap: 60px;
  width: 85%;
  margin: 100px auto;
  align-items: flex-start;
}

/* 左邊地圖 */
.map-area {
  width: 55%;
  height: 420px;
}

/* 右邊圖片區 */
.map-images {
  width: 40%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ⭐ Map_1 */
.map-small {
  width: 90px;   /* 改這裡大小 */
  display: block;
}

/* ⭐ Map_2 */
.map-info {
  width: 100%;
  display: block;
}
  .footer {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 20px 40px;
  border-top: 1px solid #ccc;
  margin-top: 80px;
  font-size: 14px;
  color: #555;
}

/* ⭐ 讓三塊平均分 */
.footer-info {
  display: flex;
  gap: 40px;
  align-items: center;
  flex: 3;   /* 左邊佔 3 份 */
}

.footer-info div {
  flex: 1;   /* 日期 / 地點 平均 */
  line-height: 1.6;
}

/* ⭐ 中間 */
.copyright {
  flex: 1;
  text-align: center;
  font-style: italic;
  color: #888;
}

/* ⭐ 右邊 */
.music-player {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}

.music-player audio {
  height: 30px;
}
/* =========================================
   Event Detail RWD：手機 / 平板 / 大螢幕
========================================= */

* {
  box-sizing: border-box;
}

body {
  overflow-x: hidden;
}

/* 讓圖片不爆版 */
img,
iframe {
  max-width: 100%;
}

/* ===== 大螢幕 1600px 以上 ===== */
@media (min-width: 1600px) {
  .event-section,
  .map-section {
    width: 72%;
  }

  .event-title {
    width: 420px;
  }

  .event-detail {
    font-size: 20px;
  }

  .map-area {
    height: 480px;
  }
}

/* ===== 平板 / 小筆電 1024px 以下 ===== */
@media (max-width: 1024px) {
  .nav {
    position: static;
    width: 88%;
    margin: 16px auto 0;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
  }

  .nav a {
    font-size: 13px;
  }

  .container {
    width: 92%;
    padding: 24px 0 0;
  }

  h1 img {
    height: 65px;
    margin: 0 auto 10px;
  }

  .event-section {
    width: 90%;
    gap: 40px;
  }

  .event-info,
  .event-photo-area {
    width: 48%;
  }

  .event-title {
    width: 280px;
    margin-bottom: 30px;
  }

  .event-detail {
    font-size: 16px;
    line-height: 1.8;
  }

  .address {
    font-size: 16px;
  }

  .map-section {
    width: 90%;
    gap: 30px;
    margin: 70px auto;
  }

  .map-area {
    width: 55%;
    height: 360px;
  }

  .map-images {
    width: 40%;
  }

  .map-small {
    width: 70px;
  }

  .map-images img:last-child {
    width: 100%;
  }

  .footer {
    flex-direction: column;
    gap: 18px;
    text-align: center;
  }

  .footer-info {
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .music-player {
    justify-content: center;
    width: 100%;
  }
}

/* ===== 手機 600px 以下 ===== */
@media (max-width: 600px) {
  .nav {
    position: static;
    width: 92%;
    margin: 14px auto 0;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 6px 0;
  }

  .nav a {
    font-size: 12px;
  }

  .container {
    width: 92%;
    padding: 18px 0 0;
  }

  h1 img {
    height: 48px;
    margin: 0 auto 12px;
  }

  /* Event 區塊上下排 */
  .event-section {
    flex-direction: column;
    width: 92%;
    gap: 28px;
    margin: 20px auto 50px;
    text-align: center;
  }

  .event-info,
  .event-photo-area {
    width: 100%;
  }

  .event-title {
    width: 220px;
    margin: 0 auto 24px;
  }

  .event-detail {
    font-size: 15px;
    line-height: 1.8;
    letter-spacing: 0.5px;
  }

  .event-detail p {
    margin-bottom: 10px;
  }

  .label {
    width: auto;
  }

  .sub-item {
    padding-left: 0;
    margin-top: -2px;
  }

  .address {
    margin-left: 0;
    font-size: 15px;
    line-height: 1.7;
  }

  .event-photo {
    width: 86%;
    margin: 0 auto;
  }

  /* Map 區塊上下排 */
  .map-section {
    flex-direction: column;
    width: 92%;
    gap: 24px;
    margin: 50px auto 70px;
    align-items: center;
  }

  .map-area {
    width: 100%;
    height: 300px;
  }

  .map-images {
    width: 100%;
    align-items: center;
    gap: 18px;
  }

  .map-small {
    width: 80px;
    margin: 0 auto;
  }

  .map-images img:last-child {
    width: 100%;
    height: auto;
    display: block;
  }

  .footer {
    flex-direction: column;
    padding: 24px 18px;
    margin-top: 50px;
    text-align: center;
    gap: 18px;
  }

  .footer-info {
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .footer-info div {
    width: 100%;
  }

  .music-player {
    justify-content: center;
    width: 100%;
  }

  .music-player audio {
    width: 90%;
  }
}

/* ===== 小手機 390px 以下 ===== */
@media (max-width: 390px) {
  .nav a {
    font-size: 11px;
  }

  .event-title {
    width: 200px;
  }

  .event-detail {
    font-size: 14px;
  }

  .map-area {
    height: 270px;
  }

  .map-images img:last-child {
    width: 96%;
  }
}
  </style>
</head>

<div class="map-section">

</div>

    <div class="copyright">

</div>
