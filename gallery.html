.nav {
  position: fixed;
  top: 30px;
  right: 40px;
  z-index: 9999; /* 讓選單永遠在最上層 */
}
.gallery-bg {
  width: 100%;
  position: absolute;
  top: 60%;
  left: 50%;
  z-index: 1;

  opacity: 0;
  transform: translate(-150%, -50%);
  animation: slideInLeft 1.5s ease-out forwards;
}

.gallery-main-photo {
  width: 65%;
  display: block;
  margin: 0 auto;
  position: relative;
  top: 100%;
  z-index: 2;

  opacity: 0;
  transform: translateX(150%);
  animation: slideInRight 1.5s ease-out 0.4s forwards;
  animation-fill-mode: both;
}
.lightbox img {
  max-width: 90vw !important;
  max-height: 90vh !important;
}
@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translate(-150%, -50%);
  }

  to {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(150%);
  }

  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* head2 從右邊進來 */
@keyframes slideInRight {
  from {
    transform: translateX(150%);
    opacity: 0;
  }

  to {
    transform: translateX(0);
    opacity: 1;
  }
}
.gallery-title {
  position: absolute;   /* ⭐ 脫離排版 */
  top: 20px;            /* 距離上面 */
  left: 40px;           /* 距離左邊 */
  width: 130px;         /* 控制大小 */
  z-index: 10;          /* 確保在最上面 */
}

.gallery-hero {
  position: relative;
  width: 85%;
  margin: 90px auto 0;
}

.gallery-bg {
  width: 100%;
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
}

.gallery-main-photo {
  width: 65%;
  display: block;
  margin: 0 auto;
  position: relative;
  top: 100%;
  z-index: 2;
}
.gallery-preview-text {
  margin-top: 20px;              /* ⭐ 原本40 → 拉開距離 */
  text-align: center;
  font-family: "Noto Serif TC", serif;
  color: #333;
  letter-spacing: 1.2px;         /* ⭐ 稍微收一點比較精緻 */

  position: relative;            /* ⭐ 關鍵：避免被蓋 */
  z-index: 5;                    /* ⭐ 確保在圖片上面 */
}

.gallery-preview-text p:first-child {
  font-size: 26px;               /* ⭐ 稍微放大更有主標感 */
  font-style: italic;
  margin: 0 0 14px;
}

.gallery-preview-text p:last-child {
  font-size: 16px;
  margin: 0;
  color: #777;                   /* ⭐ 更柔一點 */
}
.category-section {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 60px auto;
}

.card {
  width: 160px;
  background: #f8f8f8;
  border-radius: 12px;
  text-align: center;
  padding: 10px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card img {
  width: 100%;
  border-radius: 0;   /* ⭐ 完全方形 */
}

.card p {
  margin-top: 12px;
  font-family: serif;
  letter-spacing: 2px;
}

.card:hover {
  transform: translateY(-8px);
}
.gallery-group img {
  width: 80%;
  max-width: 1000px;
  display: block;
  margin: 80px auto;

  border-radius: 12px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
  width: 82%;
  margin: 50px auto 120px;
}

.photo-grid img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  border-radius: 14px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.08);
}
.lightboxOverlay {
  z-index: 9998 !important;
}

.lightbox {
  z-index: 9999 !important;
}

.nav {
  z-index: 1000;
}
.lightbox .lb-image {
  max-width: 90vw !important;
  max-height: 85vh !important;
  width: auto !important;
  height: auto !important;
  object-fit: contain !important;
}
.photo-grid a {
  display: block;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.photo-grid a:hover {
  transform: translateY(-10px);
}
@media (max-width: 768px) {
  .photo-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 20px 40px;
  border-top: 1px solid #ccc;
  margin-top: 80px;
  font-size: 14px;
  color: #555;
}

/* ⭐ 讓三塊平均分 */
.footer-info {
  display: flex;
  gap: 40px;
  align-items: center;
  flex: 3;   /* 左邊佔 3 份 */
}

.footer-info div {
  flex: 1;   /* 日期 / 地點 平均 */
  line-height: 1.6;
}

/* ⭐ 中間 */
.copyright {
  flex: 1;
  text-align: center;
  font-style: italic;
  color: #888;
}

/* ⭐ 右邊 */
.music-player {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}

.music-player audio {
  height: 30px;
}

/* ===== 超大螢幕 ===== */
@media (min-width: 1600px){

  .gallery-hero{
    width: 70%;
  }

  }

/* ===== 筆電 / 平板 ===== */
@media (max-width: 1024px){

  .nav{
    position: static;
    width: 88%;
    margin: 16px auto 0;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16px;
  }

    position: static;
    display: block;
    margin: 30px auto 10px;
    width: 110px;
  }

  .gallery-hero{
    width: 92%;

  }

  .gallery-main-photo{
    width: 78%;
  }

  .gallery-preview-text{
    margin-top: 50px;
    padding: 0 20px;
  }

  .gallery-preview-text p:first-child{
    font-size: 22px;
  }

  .category-section{
    flex-wrap: wrap;
    gap: 20px;
    width: 92%;
  }

  .card{
    width: 145px;
  }

  .photo-grid{
    width: 90%;
    grid-template-columns: repeat(2,1fr);
    gap: 18px;
  }

  .photo-grid img{
    height: 240px;
  }

  .footer{
    flex-direction: column;
    gap: 18px;
    text-align: center;
  }

  .footer-info{
    flex-wrap: wrap;
    justify-content: center;
  }

  .music-player{
    justify-content:center;
    width:100%;
  }
}
