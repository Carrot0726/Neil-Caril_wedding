<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP | Wedding Website</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      background-color: #efefef;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    /* ===== 導覽列 ===== */
    .nav {
      position: fixed;
      top: 30px;
      right: 40px;
      display: flex;
      gap: 24px;
      padding: 8px 0;
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
    }

    .nav a {
      text-decoration: none;
      color: #333;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .nav a:hover {
      opacity: 0.6;
    }
     body {
    margin: 0;
    background-color: #efefef;
  }
  h1 img {
    width: auto;
    height: 70px;
    display: block;
    margin-left: 20px;
    margin-top: -20px;
  }
  .rsvp-section {
  text-align: center;
  margin: 100px auto;
}

.rsvp-photo {
  width: 70%;
  max-width: 800px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  display: block;
  margin: -80 auto 40px;
}

/* 💌 按鈕 */
.rsvp-btn {
  display: inline-block;
  padding: 14px 36px;
  font-size: 16px;
  letter-spacing: 2px;
  text-decoration: none;
  color: #333;
  border: 1px solid #333;
  border-radius: 30px;
  transition: all 0.3s ease;
}

/* hover 效果（很重要✨） */
.rsvp-btn:hover {
  background: #333;
  color: #fff;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 20px 40px;
  border-top: 1px solid #ccc;
  margin-top: 80px;
  font-size: 14px;
  color: #555;
}

/* ⭐ 讓三塊平均分 */
.footer-info {
  display: flex;
  gap: 40px;
  align-items: center;
  flex: 3;   /* 左邊佔 3 份 */
}

.footer-info div {
  flex: 1;   /* 日期 / 地點 平均 */
  line-height: 1.6;
}

/* ⭐ 中間 */
.copyright {
  flex: 1;
  text-align: center;
  font-style: italic;
  color: #888;
}

/* ⭐ 右邊 */
.music-player {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}

.music-player audio {
  height: 30px;
}
/* ===== RSVP RWD ===== */
* {
  box-sizing: border-box;
}

body {
  overflow-x: hidden;
}

/* 大螢幕 */
@media (min-width: 1600px) {
  .rsvp-photo {
    max-width: 900px;
  }
}

/* 平板 / 小筆電 */
@media (max-width: 1024px) {
  .nav {
    position: static;
    width: 86%;
    margin: 16px auto 0;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
  }

  .nav a {
    font-size: 13px;
  }

  .container {
    width: 92%;
    padding: 24px 0 0;
  }

  h1 img {
    height: 60px;
    margin: 0 auto 20px;
  }

  .rsvp-section {
    margin: 50px auto 80px;
  }

  .rsvp-photo {
    width: 82%;
    max-width: 760px;
    margin: 0 auto 34px;
  }

  .footer {
    flex-direction: column;
    gap: 18px;
    text-align: center;
  }

  .footer-info {
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .music-player {
    justify-content: center;
    width: 100%;
  }
}

/* 手機 */
@media (max-width: 600px) {
  .nav {
    width: 90%;
    gap: 10px;
    padding: 6px 0;
  }

  .nav a {
    font-size: 12px;
  }

  .container {
    width: 92%;
    padding: 18px 0 0;
  }

  h1 img {
    height: 46px;
    margin: 0 auto 16px;
  }

  .rsvp-section {
    margin: 30px auto 60px;
  }

  .rsvp-photo {
    width: 92%;
    border-radius: 14px;
    margin: 0 auto 28px;
  }

  .rsvp-btn {
    padding: 12px 28px;
    font-size: 14px;
    letter-spacing: 1.5px;
  }

  .footer {
    flex-direction: column;
    padding: 24px 18px;
    margin-top: 50px;
    text-align: center;
    gap: 18px;
  }

  .footer-info {
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .footer-info div {
    width: 100%;
  }

  .music-player {
    justify-content: center;
    width: 100%;
  }

  .music-player audio {
    width: 90%;
  }
}
  </style>
