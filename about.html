  <style>
    body {
      margin: 0;

    .container {
      max-width: 1200px;

    }
    /* ===== 導覽列 ===== */
    .nav {
      position: fixed;
      top: 30px;
      right: 40px;
      display: flex;
      gap: 24px;
      padding: 8px 0;
      border-top: 1px solid #333;

    }

    .nav a {
      text-decoration: none;
      color: #333;

      letter-spacing: 0.5px;

    .nav a:hover {

     body {
    margin: 0;
    background-color: #efefef;
  }
  h1 img {
    width: auto;
    height: 80px;
    display: block;
    margin-left: 20px;
    margin-top: -20px;
  }
  .about-section {
  width: 80%;
  margin: 40px auto;
}
.about-section img:first-child {
  transform: translateY(-40px);  /* ⭐ 往上移 */
}
.about-section img {

  width: 100%;
  height: auto;
  display: block;

  margin-bottom: 80px;  /* ⭐ 每張之間的距離 */
}
/* 一開始先透明、往下 */
.reveal {
  opacity: 0;
  transform: translateY(60px);
  transition: opacity 1s ease, transform 1s ease;
}

/* 出現時淡入、回到原位 */
.reveal.active {
  opacity: 1;
  transform: translateY(0);
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 20px 40px;
  border-top: 1px solid #ccc;
  margin-top: 80px;
  font-size: 14px;
  color: #555;
}

/* ⭐ 讓三塊平均分 */
.footer-info {
  display: flex;
  gap: 40px;
  align-items: center;
  flex: 3;   /* 左邊佔 3 份 */
}

.footer-info div {
  flex: 1;   /* 日期 / 地點 平均 */
  line-height: 1.6;
}

/* ⭐ 中間 */
.copyright {
  flex: 1;
  text-align: center;
  font-style: italic;
  color: #888;
}

/* ⭐ 右邊 */
.music-player {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}

.music-player audio {
  height: 30px;
}
/* ===== About RWD：只補不同尺寸，不改原本桌機版 ===== */
* {
  box-sizing: border-box;
}

body {
  overflow-x: hidden;
}

.about-section img {
  max-width: 100%;
}

/* 平板 / 小筆電 */
@media (max-width: 1024px) {
  .nav {
    position: static;
    width: 86%;
    margin: 16px auto 0;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
  }

  .nav a {
    font-size: 13px;
  }

  .container {
    width: 92%;
    padding: 24px 0 0;
  }

  h1 img {
    height: 70px;
    margin-left: 0;
    margin-top: 0;
  }

  .about-section {
    width: 88%;
    margin: 30px auto;
  }

  .about-section img {
    margin-bottom: 55px;
  }

  .footer {
    flex-direction: column;
    gap: 18px;
    text-align: center;
  }

  .footer-info {
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .music-player {
    justify-content: center;
    width: 100%;
  }
}

/* 手機 */
@media (max-width: 600px) {
  .nav {
    width: 90%;
    gap: 10px;
    padding: 6px 0;
  }
  /* 手機版 About 標題置中 */
  .container h1 {
    display: flex;
    justify-content: center;
}

.container h1 img {
  margin: 0 auto 20px;
}

  .nav a {
    font-size: 12px;
  }

  .container {
    width: 92%;
    padding: 18px 0 0;
  }

  h1 img {
    height: 55px;
    margin-left: 0;
    margin-top: 0;
  }

  .about-section {
    width: 94%;
    margin: 20px auto 50px;
  }

  .about-section img:first-child {
    transform: translateY(-10px);
  }

  .about-section img {
    margin-bottom: 35px;
  }

  .footer {
    flex-direction: column;
    padding: 24px 18px;
    margin-top: 50px;
    text-align: center;
    gap: 18px;
  }

  .footer-info {
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .footer-info div {
    width: 100%;
  }

  .music-player {
    justify-content: center;
    width: 100%;
  }

  .music-player audio {
    width: 90%;
  }
}
  </style>

<script>
  window.addEventListener("load", function () {
    const revealItems = document.querySelectorAll(".reveal");

    function revealOnScroll() {
      revealItems.forEach(function (item) {
        const itemTop = item.getBoundingClientRect().top;
        const windowHeight = window.innerHeight;

        if (itemTop < windowHeight - 100) {
          item.classList.add("active");
        }
      });
    }

    revealOnScroll();
    window.addEventListener("scroll", revealOnScroll);
  });
</script>
